workflows:
  ios-downbad:
    name: Downbad iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_SCHEME: "Downbad"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Build iOS app (no signing)
        script: |
          xcodebuild build \
            -project Downbad.xcodeproj \
            -scheme Downbad \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | tee /tmp/xcodebuild.log
    artifacts:
      - /tmp/xcodebuild.log
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true

  ios-downbad-dev:
    name: Downbad Dev (signed for installed devices)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: voicegate_appstore
    environment:
      vars:
        XCODE_SCHEME: "Downbad"
        BUNDLE_ID: "com.voicegate.app"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Set up code signing (dev profiles for all bundle IDs)
        script: |
          set -e
          keychain initialize

          # Pre-generate a private key — Codemagic CLI's certificates create
          # needs an explicit key path; it does not auto-generate.
          CERT_KEY=/tmp/dev_cert_key.pem
          openssl genrsa -out "$CERT_KEY" 2048

          # Create a dev certificate in App Store Connect bound to the key
          app-store-connect certificates create \
            --type DEVELOPMENT \
            --certificate-key "@file:$CERT_KEY" \
            --save

          # Fetch/create profiles for each bundle ID, signing with the new cert
          for ID in "$BUNDLE_ID" "$BUNDLE_ID.ShieldConfiguration" "$BUNDLE_ID.ShieldAction" "$BUNDLE_ID.DeviceActivityMonitor"; do
            app-store-connect fetch-signing-files "$ID" \
              --platform IOS \
              --type IOS_APP_DEVELOPMENT \
              --certificate-key "@file:$CERT_KEY" \
              --create
          done

          keychain add-certificates
          xcode-project use-profiles
      - name: Build dev-signed .ipa
        script: |
          set -o pipefail
          xcode-project build-ipa \
            --project "Downbad.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --verbose \
            2>&1 | tee /tmp/xcodebuild.log
      - name: Collect xcodebuild logs on failure
        when:
          condition: failure
        script: |
          mkdir -p /tmp/full_logs
          cp /tmp/xcodebuild.log /tmp/full_logs/ 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.xcactivitylog" -exec cp {} /tmp/full_logs/ \; 2>/dev/null || true
          find /Users/builder/clone/build -name "*.log" -exec cp {} /tmp/full_logs/ \; 2>/dev/null || true
          ls -la /tmp/full_logs/ || true
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild.log
      - /tmp/full_logs/*
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true
