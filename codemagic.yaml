workflows:
  ios-downbad:
    name: Downbad iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_SCHEME: "Downbad"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Build iOS app (no signing)
        script: |
          xcodebuild build \
            -project Downbad.xcodeproj \
            -scheme Downbad \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | tee /tmp/xcodebuild.log
    artifacts:
      - /tmp/xcodebuild.log
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true

  ios-downbad-dev:
    name: Downbad Dev (signed for installed devices)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: voicegate_appstore
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_SCHEME: "Downbad"
        BUNDLE_ID: "com.voicegate.app"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          # Decode the persistent .p12 from the secret env var and load into keychain
          echo "P12_BASE64 length: ${#P12_BASE64}"
          echo "P12_PASSWORD length: ${#P12_PASSWORD}"
          echo "$P12_BASE64" | base64 -d > /tmp/downbad_dev.p12
          ls -la /tmp/downbad_dev.p12
          # Verify the .p12 is parseable with the password before handing to Codemagic CLI
          openssl pkcs12 -in /tmp/downbad_dev.p12 -info -nokeys -nocerts -passin "pass:$P12_PASSWORD" -legacy 2>&1 | head -10 || echo "openssl info failed"
          openssl pkcs12 -in /tmp/downbad_dev.p12 -nocerts -passin "pass:$P12_PASSWORD" -legacy -passout "pass:throwaway" >/tmp/key_check.pem 2>&1 && \
            echo "Key extraction OK: $(grep -c 'PRIVATE KEY' /tmp/key_check.pem) PRIVATE KEY markers" || \
            echo "Key extraction FAILED: $(head -3 /tmp/key_check.pem)"
          # Same code path Codemagic CLI uses
          python3 -c "
          from cryptography.hazmat.primitives.serialization import pkcs12
          import os
          with open('/tmp/downbad_dev.p12','rb') as f: data = f.read()
          pwd = os.environ['P12_PASSWORD'].encode()
          print(f'cryptography: data={len(data)} bytes, pwd_len={len(pwd)}')
          try:
              key, cert, addl = pkcs12.load_key_and_certificates(data, pwd)
              print(f'cryptography: key={type(key).__name__ if key else None}')
              print(f'cryptography: cert={cert.subject.rfc4514_string() if cert else None}')
          except Exception as e:
              print(f'cryptography: ERROR {type(e).__name__}: {e}')
          "
          keychain add-certificates \
            --certificate /tmp/downbad_dev.p12 \
            --certificate-password "$P12_PASSWORD"
          # Create (or fetch) a dev provisioning profile for each bundle ID,
          # bound to the cert already loaded in the keychain.
          for ID in "$BUNDLE_ID" "$BUNDLE_ID.ShieldConfiguration" "$BUNDLE_ID.ShieldAction" "$BUNDLE_ID.DeviceActivityMonitor"; do
            app-store-connect fetch-signing-files "$ID" \
              --platform IOS \
              --type IOS_APP_DEVELOPMENT \
              --create
          done
          xcode-project use-profiles
      - name: Build dev-signed .ipa
        script: |
          set -o pipefail
          xcode-project build-ipa \
            --project "Downbad.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --verbose \
            2>&1 | tee /tmp/xcodebuild.log
      - name: Collect xcodebuild logs on failure
        when:
          condition: failure
        script: |
          mkdir -p /tmp/full_logs
          cp /tmp/xcodebuild.log /tmp/full_logs/ 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.xcactivitylog" -exec cp {} /tmp/full_logs/ \; 2>/dev/null || true
          find /Users/builder/clone/build -name "*.log" -exec cp {} /tmp/full_logs/ \; 2>/dev/null || true
          ls -la /tmp/full_logs/ || true
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild.log
      - /tmp/full_logs/*
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true
