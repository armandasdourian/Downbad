workflows:
  ios-downbad:
    name: Downbad iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_SCHEME: "Downbad"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Build iOS app (no signing)
        script: |
          xcodebuild build \
            -project Downbad.xcodeproj \
            -scheme Downbad \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | tee /tmp/xcodebuild.log
    artifacts:
      - /tmp/xcodebuild.log
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true

  ios-downbad-dev:
    name: Downbad Dev (signed for installed devices)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: voicegate_appstore
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.voicegate.app
      vars:
        XCODE_SCHEME: "Downbad"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Fetch development signing files
        script: xcode-project use-profiles
      - name: Build dev-signed .ipa
        script: |
          xcode-project build-ipa \
            --project "Downbad.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            | tee /tmp/xcodebuild.log
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild.log
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true
