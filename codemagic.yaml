workflows:
  # ──────────────────────────────────────────────────────────────────────
  # Preview screenshots — boots an iOS Simulator on the Mac runner, builds
  # the app unsigned, takes 2 screenshots (onboarding step 0 + home/auth
  # recovery state), emails them to you.
  #
  # Use case: you don't have a Mac. Push a branch named feature/* and
  # within ~5min you get an email with screenshots.
  #
  # Limitations:
  # - Family Controls APIs don't function in iOS Simulator. The Home view
  #   will render the "we lost screen time access" recovery state since
  #   AuthorizationCenter never reaches .approved in CI.
  # - Camera + speech recognition won't work in the simulator either, so
  #   the unlock screen won't be reachable here.
  # - For pixel-perfect QA of the UnlockView, the only path is a real
  #   device or MacInCloud + manual run.
  ios-downbad-preview:
    name: Downbad Preview Screenshots
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'feature/*'
          include: true
          source: true
        - pattern: 'design/*'
          include: true
          source: true
        - pattern: 'preview/*'
          include: true
          source: true
    environment:
      vars:
        XCODE_SCHEME: "Downbad"
        SIM_DEVICE: "iPhone 15 Pro"
        BUNDLE_ID: "com.voicegate.app"
        APP_GROUP: "group.com.voicegate.app"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Build for simulator
        script: |
          set -o pipefail
          xcodebuild build \
            -project Downbad.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$SIM_DEVICE" \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcodebuild.log
      - name: Boot simulator + install app
        script: |
          set -e
          APP_PATH=$(find ./DerivedData/Build/Products/Debug-iphonesimulator -name "Downbad.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find Downbad.app in DerivedData"
            find ./DerivedData -name "*.app" -type d
            exit 1
          fi
          echo "App: $APP_PATH"

          # Find or boot the device
          SIM_ID=$(xcrun simctl list devices "$SIM_DEVICE" available | grep -oE '\(([A-F0-9-]{36})\)' | head -1 | tr -d '()')
          if [ -z "$SIM_ID" ]; then
            echo "Could not find $SIM_DEVICE in available simulators"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true   # already-booted is fine
          xcrun simctl install "$SIM_ID" "$APP_PATH"
          echo "$SIM_ID" > /tmp/sim_id
      - name: Capture screenshots
        script: |
          set -e
          SIM_ID=$(cat /tmp/sim_id)
          mkdir -p screenshots

          # 1. Fresh launch — should land on onboarding step 0 (welcome / judge letterhead)
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID"
          sleep 5
          xcrun simctl io "$SIM_ID" screenshot screenshots/01-onboarding-welcome.png
          echo "✓ 01-onboarding-welcome.png"

          # 2. Skip onboarding (toggle hasOnboarded in app-group defaults), re-launch — home with auth-recovery
          xcrun simctl terminate "$SIM_ID" "$BUNDLE_ID"
          xcrun simctl spawn "$SIM_ID" defaults write "$APP_GROUP" hasOnboarded -bool true
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID"
          sleep 5
          xcrun simctl io "$SIM_ID" screenshot screenshots/02-home-auth-recovery.png
          echo "✓ 02-home-auth-recovery.png"

          ls -la screenshots/
    artifacts:
      - screenshots/*.png
      - /tmp/xcodebuild.log
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true

  ios-downbad:
    name: Downbad iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_SCHEME: "Downbad"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Build iOS app (no signing)
        script: |
          xcodebuild build \
            -project Downbad.xcodeproj \
            -scheme Downbad \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | tee /tmp/xcodebuild.log
    artifacts:
      - /tmp/xcodebuild.log
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true

  ios-downbad-dev:
    name: Downbad Dev (signed for installed devices)
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    integrations:
      app_store_connect: voicegate_appstore
    environment:
      groups:
        - ios_signing
        - firebase
      vars:
        XCODE_SCHEME: "Downbad"
        BUNDLE_ID: "com.voicegate.app"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          echo "$P12_BASE64" | base64 -d > /tmp/downbad_dev.p12
          keychain add-certificates \
            --certificate /tmp/downbad_dev.p12 \
            --certificate-password "$P12_PASSWORD"
          security find-identity -v -p codesigning
          # Codemagic's APP_STORE_CONNECT_PRIVATE_KEY is a "@file:..." string
          # that only Codemagic CLI tools resolve — raw xcodebuild can't.
          # Decode the .p8 from a separate base64 env var into the path xcodebuild expects.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          P8_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 -d > "$P8_PATH"
          chmod 600 "$P8_PATH"
          echo "p8 first line: $(head -1 "$P8_PATH")"
          echo "p8 line count: $(wc -l < "$P8_PATH")"
      - name: Build dev-signed .ipa
        script: |
          set -o pipefail
          mkdir -p build/ios/xcarchive build/ios/ipa
          # Use -allowProvisioningUpdates with the App Store Connect API key so xcodebuild
          # fetches/creates profiles tied to the cert already in the keychain.
          # Avoids the brittleness of separate fetch-signing-files runs that produced
          # profiles bound to different certs.
          xcodebuild archive \
            -project "Downbad.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -archivePath "build/ios/xcarchive/Downbad.xcarchive" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            DEVELOPMENT_TEAM="Q32TFF7K3U" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcodebuild.log
          if grep -q "isn't code signed" /tmp/xcodebuild.log; then
            echo "ERROR: archive succeeded but binaries are unsigned" >&2
            exit 1
          fi
          cat > /tmp/ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>development</string>
            <key>teamID</key><string>Q32TFF7K3U</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "build/ios/xcarchive/Downbad.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "build/ios/ipa" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            2>&1 | tee -a /tmp/xcodebuild.log
      - name: Collect xcodebuild logs on failure
        when:
          condition: failure
        script: |
          echo "===== /tmp/xcodebuild.log (last 300 lines) ====="
          tail -n 300 /tmp/xcodebuild.log 2>/dev/null || echo "no /tmp/xcodebuild.log"
          echo ""
          echo "===== Codemagic xcode-project build log ====="
          find /Users/builder/Library/Logs -name "*.log" -mmin -10 2>/dev/null | while read f; do
            echo "--- $f ---"
            tail -n 200 "$f"
          done
          echo ""
          echo "===== xcactivitylog (decoded) ====="
          find ~/Library/Developer/Xcode/DerivedData -name "*.xcactivitylog" -mmin -10 2>/dev/null | head -3 | while read f; do
            echo "--- $f ---"
            gunzip -c "$f" 2>/dev/null | strings | grep -E "error:|warning:|FAILED|Code Sign|Provisioning" | tail -n 60 || true
          done
          echo ""
          echo "===== build/ios logs ====="
          find /Users/builder/clone/build -name "*.log" 2>/dev/null | while read f; do
            echo "--- $f ---"
            tail -n 100 "$f"
          done
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild.log
      - /tmp/full_logs/*
    publishing:
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        ios:
          app_id: $FIREBASE_APP_ID
          groups:
            - testers
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true

  ios-downbad-release:
    name: Downbad Release (App Store / TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    # Manual trigger only — do NOT auto-build on push.
    # Run from Codemagic UI when ready to ship a build.
    # Will fail until Family Controls (Distribution) entitlement is granted.
    integrations:
      app_store_connect: voicegate_appstore
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_SCHEME: "Downbad"
        BUNDLE_ID: "com.voicegate.app"
        APP_STORE_APPLE_ID: "" # Set after creating App Store Connect record
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Bump build number
        script: |
          # Use App Store Connect's latest build number + 1, so TestFlight uploads never collide.
          set -e
          BUILD_NUMBER=$(($(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0) + 1))
          echo "Using build number: $BUILD_NUMBER"
          cd "$CM_BUILD_DIR"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "Downbad/Info.plist" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" "Downbad/Info.plist"
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          # Reuse the same dev .p12 — Codemagic's app_store_connect integration will fetch
          # the matching distribution profile via -allowProvisioningUpdates.
          echo "$P12_BASE64" | base64 -d > /tmp/downbad.p12
          keychain add-certificates \
            --certificate /tmp/downbad.p12 \
            --certificate-password "$P12_PASSWORD"
          security find-identity -v -p codesigning
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          P8_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 -d > "$P8_PATH"
          chmod 600 "$P8_PATH"
      - name: Archive for App Store
        script: |
          set -o pipefail
          mkdir -p build/ios/xcarchive build/ios/ipa
          xcodebuild archive \
            -project "Downbad.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -archivePath "build/ios/xcarchive/Downbad.xcarchive" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            DEVELOPMENT_TEAM="Q32TFF7K3U" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcodebuild.log
          if grep -q "isn't code signed" /tmp/xcodebuild.log; then
            echo "ERROR: archive succeeded but binaries are unsigned" >&2
            exit 1
          fi
      - name: Export App Store IPA
        script: |
          set -o pipefail
          cat > /tmp/ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>Q32TFF7K3U</string>
            <key>uploadSymbols</key><true/>
            <key>signingStyle</key><string>automatic</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "build/ios/xcarchive/Downbad.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "build/ios/ipa" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            2>&1 | tee -a /tmp/xcodebuild.log
      - name: Collect xcodebuild logs on failure
        when:
          condition: failure
        script: |
          echo "===== /tmp/xcodebuild.log (last 300 lines) ====="
          tail -n 300 /tmp/xcodebuild.log 2>/dev/null || echo "no log"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild.log
    publishing:
      app_store_connect:
        auth: integration
        # Auto-distributes to TestFlight internal testers on successful upload.
        # Set submit_to_app_store: true ONLY when ready to submit to App Review.
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true
