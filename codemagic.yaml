workflows:
  ios-downbad:
    name: Downbad iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_SCHEME: "Downbad"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Build iOS app (no signing)
        script: |
          xcodebuild build \
            -project Downbad.xcodeproj \
            -scheme Downbad \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | tee /tmp/xcodebuild.log
    artifacts:
      - /tmp/xcodebuild.log
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true

  ios-downbad-dev:
    name: Downbad Dev (signed for installed devices)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: voicegate_appstore
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_SCHEME: "Downbad"
        BUNDLE_ID: "com.voicegate.app"
      xcode: latest
    scripts:
      - name: Set up Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          echo "$P12_BASE64" | base64 -d > /tmp/downbad_dev.p12
          # Extract the PEM private key from the .p12 — fetch-signing-files requires it
          # via --certificate-key (PEM/OpenSSH, NOT pkcs12). The keychain has the .p12
          # itself; the PEM is a separate handoff for the App Store Connect API call.
          openssl pkcs12 -in /tmp/downbad_dev.p12 -nocerts -nodes \
            -passin "pass:$P12_PASSWORD" -legacy \
            -out /tmp/downbad_dev_key.pem
          keychain add-certificates \
            --certificate /tmp/downbad_dev.p12 \
            --certificate-password "$P12_PASSWORD"
          # Create (or fetch) a dev provisioning profile for each bundle ID
          for ID in "$BUNDLE_ID" "$BUNDLE_ID.ShieldConfiguration" "$BUNDLE_ID.ShieldAction" "$BUNDLE_ID.DeviceActivityMonitor"; do
            app-store-connect fetch-signing-files "$ID" \
              --platform IOS \
              --type IOS_APP_DEVELOPMENT \
              --certificate-key=@file:/tmp/downbad_dev_key.pem \
              --create
          done
          xcode-project use-profiles
      - name: Build dev-signed .ipa
        script: |
          set -o pipefail
          xcode-project build-ipa \
            --project "Downbad.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --verbose \
            2>&1 | tee /tmp/xcodebuild.log
      - name: Collect xcodebuild logs on failure
        when:
          condition: failure
        script: |
          mkdir -p /tmp/full_logs
          cp /tmp/xcodebuild.log /tmp/full_logs/ 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*.xcactivitylog" -exec cp {} /tmp/full_logs/ \; 2>/dev/null || true
          find /Users/builder/clone/build -name "*.log" -exec cp {} /tmp/full_logs/ \; 2>/dev/null || true
          ls -la /tmp/full_logs/ || true
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild.log
      - /tmp/full_logs/*
    publishing:
      email:
        recipients:
          - armandasdourian@gmail.com
        notify:
          success: true
          failure: true
