name: Downbad
options:
  bundleIdPrefix: com.voicegate
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: Q32TFF7K3U

targets:
  Downbad:
    type: application
    platform: iOS
    sources:
      - Downbad
      - Shared
    info:
      path: Downbad/Info.plist
      properties:
        CFBundleDisplayName: Downbad
        UILaunchScreen: {}
        NSCameraUsageDescription: "Downbad needs camera access so you can say your unlock phrase on camera."
        NSMicrophoneUsageDescription: "Downbad needs microphone access to hear your unlock phrase."
        NSSpeechRecognitionUsageDescription: "Downbad uses speech recognition to verify your unlock phrase."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicegate.app
        CODE_SIGN_ENTITLEMENTS: Downbad/Downbad.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: ShieldConfigurationExtension
      - target: ShieldActionExtension
      - target: DeviceActivityMonitorExtension

  ShieldConfigurationExtension:
    type: app-extension
    platform: iOS
    sources:
      - Extensions/ShieldConfigurationExtension
      - Shared
    info:
      path: Extensions/ShieldConfigurationExtension/Info.plist
      properties:
        CFBundleDisplayName: ShieldConfigurationExtension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldConfigurationExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicegate.app.ShieldConfiguration
        CODE_SIGN_ENTITLEMENTS: Extensions/ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements

  ShieldActionExtension:
    type: app-extension
    platform: iOS
    sources:
      - Extensions/ShieldActionExtension
      - Shared
    info:
      path: Extensions/ShieldActionExtension/Info.plist
      properties:
        CFBundleDisplayName: ShieldActionExtension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettings.shield-action
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldActionExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicegate.app.ShieldAction
        CODE_SIGN_ENTITLEMENTS: Extensions/ShieldActionExtension/ShieldActionExtension.entitlements

  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - Extensions/DeviceActivityMonitorExtension
      - Shared
    info:
      path: Extensions/DeviceActivityMonitorExtension/Info.plist
      properties:
        CFBundleDisplayName: DeviceActivityMonitorExtension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.DeviceActivity.monitor
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).DeviceActivityMonitorExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicegate.app.DeviceActivityMonitor
        CODE_SIGN_ENTITLEMENTS: Extensions/DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
